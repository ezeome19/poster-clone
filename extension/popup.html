<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 260px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            color: #fff;
            padding: 20px;
        }
        .logo {
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #3B82F6;
            margin-bottom: 12px;
        }
        h1 {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
            line-height: 1.1;
        }
        p {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22C55E;
            animation: pulse 2s infinite;
            flex-shrink: 0;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .site-list {
            list-style: none;
            margin-bottom: 16px;
        }
        .site-list li {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .open-btn {
            display: block;
            width: 100%;
            background: #3B82F6;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 10px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }
        .open-btn:hover { background: #2563EB; }
    </style>
</head>
<body>
    <div class="logo">PosterClone</div>
    <h1>Image Importer</h1>
    <p>Click any image on the supported sites below to import it into PosterClone.</p>

    <div class="status">
        <div class="dot"></div>
        Extension Active
    </div>

    <ul class="site-list">
        <li>📌 Pinterest</li>
        <li>🌌 Cosmos.so</li>
    </ul>

    <button class="open-btn" id="openApp">Open PosterClone</button>

    <script src="popup.js"></script>
</body>
</html>
